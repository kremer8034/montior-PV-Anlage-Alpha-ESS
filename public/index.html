<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PV-Monitor</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body>
    <main class="dashboard">
      <header class="topbar">
        <img id="logo" class="logo" alt="Logo" />
        <div class="titles">
          <h1 id="headline"></h1>
          <p id="subline"></p>
        </div>
      </header>

      <section class="tiles">
        <div class="tile tile--sun">
          <div class="tile__label">Aktuelle PV-Leistung</div>
          <div class="tile__value"><span id="pvPower">–</span><span class="tile__unit">kW</span></div>
          <div class="tile__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></div>
        </div>

        <div class="tile tile--load">
          <div class="tile__label">Aktueller Verbrauch</div>
          <div class="tile__value"><span id="loadPower">–</span><span class="tile__unit">kW</span></div>
          <div class="tile__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2v6M15 2v6M7 8h10v3a5 5 0 0 1-10 0V8zM12 16v6"/></svg></div>
        </div>

        <div class="tile tile--total">
          <div class="tile__label">Heute erzeugt</div>
          <div class="tile__value"><span id="energyToday">–</span><span class="tile__unit" id="energyTodayUnit">kWh</span></div>
          <div class="tile__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg></div>
        </div>

        <div class="tile tile--batt">
          <div class="tile__label">Batterie-Ladestand</div>
          <div class="tile__value"><span id="soc">–</span><span class="tile__unit">%</span></div>
          <div class="tile__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="17" height="10" rx="2"/><path d="M22 11v2"/><rect x="4" y="9" width="9" height="6" fill="currentColor" stroke="none"/></svg></div>
        </div>
      </section>

      <section class="subtiles">
        <div class="subtile">
          <span class="subtile__label">Gesamt erzeugt</span>
          <span class="subtile__value"><span id="energyTotal">–</span> <span id="energyTotalUnit">kWh</span></span>
        </div>
        <div class="subtile subtile--co2">
          <span class="subtile__label">Eingespartes CO₂ (gesamt)</span>
          <span class="subtile__value"><span id="co2">–</span> t</span>
        </div>
      </section>

      <footer class="statusbar">
        <span id="company"></span>
        <span class="status">
          <span id="dot" class="dot"></span>
          <span id="status">Verbinde …</span>
        </span>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
